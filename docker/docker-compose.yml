services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: groooove-navidrome

    ports:
      - "4533:4533"

    restart: unless-stopped

    environment:
      ND_SCANINTERVAL: 1m
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""

    volumes:
      - ../music:/music
      - ./data:/data